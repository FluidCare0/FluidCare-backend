{% extends "admin/base_site.html" %}

{% block content %}
  <div id="content-main">
    <form method="post">
      {% csrf_token %}
      <fieldset class="module aligned">
        {% for field in form %}
          <div class="form-row">
            {{ field.errors }}
            {{ field.label_tag }}
            {{ field }}
            {% if field.help_text %}
              <div class="help">{{ field.help_text }}</div>
            {% endif %}
          </div>
        {% endfor %}
      </fieldset>
      <div class="submit-row">
        <input type="submit" value="Send notification" class="default">
        <a href="{% url 'admin:notification_app_notification_changelist' %}" class="button cancel-link">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
